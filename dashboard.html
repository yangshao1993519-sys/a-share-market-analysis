<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股复盘导航面板</title>
    <link rel="stylesheet" href="assets/css/modern.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Dashboard 专属样式 */
        .dashboard-sticky-nav {
            display: flex;
            gap: 0;
            margin-bottom: 2rem;
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            position: sticky;
            top: 88px;
            z-index: 99;
        }
        .dashboard-sticky-nav a {
            flex: 1;
            padding: 0.75rem 1rem;
            text-align: center;
            text-decoration: none;
            color: var(--gray-600);
            font-size: 0.875rem;
            font-weight: 500;
            border-bottom: 3px solid transparent;
            transition: all 0.2s ease;
        }
        .dashboard-sticky-nav a:hover,
        .dashboard-sticky-nav a.active {
            color: var(--primary-600);
            background: var(--primary-50);
            border-bottom-color: var(--primary-500);
        }

        .section-anchor {
            scroll-margin-top: 160px;
        }

        .score-circle-md {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 800;
            color: white;
            flex-shrink: 0;
        }
        .score-90-100 { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .score-80-90  { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .score-70-80  { background: linear-gradient(135deg, #10b981, #059669); }
        .score-60-70  { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .score-0-60   { background: linear-gradient(135deg, #dc2626, #b91c1c); }

        .report-item-dashboard {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.25rem;
            background: var(--gray-50);
            border-radius: var(--radius-lg);
            border-left: 4px solid var(--primary-400);
            text-decoration: none;
            color: var(--gray-900);
            transition: all 0.2s ease;
        }
        .report-item-dashboard:hover {
            background: var(--primary-50);
            border-left-color: var(--primary-600);
            transform: translateX(4px);
        }
        .report-item-dashboard.weekly {
            border-left-color: var(--success-400);
        }
        .report-item-dashboard.weekly:hover {
            background: var(--success-50);
            border-left-color: var(--success-600);
        }

        .report-body { flex: 1; }
        .report-title {
            font-size: 1.0625rem;
            font-weight: 600;
            margin-bottom: 0.375rem;
        }
        .report-summary {
            color: var(--gray-500);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .metrics-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .metric-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: var(--radius-sm);
        }
        .metric-chip.up { background: var(--danger-50); color: var(--danger-700); }
        .metric-chip.down { background: var(--success-50); color: var(--success-700); }
        .metric-chip.neutral { background: var(--gray-100); color: var(--gray-600); }
        .metric-chip.primary { background: var(--primary-50); color: var(--primary-700); }

        .view-btn {
            padding: 0.5rem 1rem;
            background: var(--primary-600);
            color: white;
            border-radius: var(--radius-md);
            text-decoration: none;
            font-size: 0.8125rem;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.2s ease;
        }
        .view-btn:hover {
            background: var(--primary-700);
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }

        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.75rem;
        }
        .task-item {
            background: var(--gray-50);
            border-radius: var(--radius-lg);
            padding: 1rem;
            text-align: center;
            border: 1px solid var(--gray-200);
            transition: all 0.2s ease;
        }
        .task-item:hover {
            border-color: var(--primary-300);
            box-shadow: var(--shadow-sm);
        }
        .task-name {
            font-weight: 600;
            font-size: 0.9375rem;
            color: var(--gray-900);
        }
        .task-time {
            font-size: 0.8125rem;
            color: var(--gray-500);
            margin-top: 0.25rem;
        }
        .task-status {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 2px 10px;
            background: var(--success-100);
            color: var(--success-700);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--gray-400);
        }
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.4;
        }

        .stats-mini-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1rem;
        }
        .stat-mini {
            background: var(--gray-50);
            border-radius: var(--radius-lg);
            padding: 1rem;
            text-align: center;
        }
        .stat-mini .label {
            font-size: 0.8125rem;
            color: var(--gray-500);
            margin-bottom: 0.25rem;
        }
        .stat-mini .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
        }

        @media (max-width: 768px) {
            .report-item-dashboard {
                flex-direction: column;
                align-items: flex-start;
            }
            .dashboard-sticky-nav a {
                font-size: 0.8125rem;
                padding: 0.625rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <header class="modern-header">
        <div class="header-container">
            <div class="logo-section">
                <div class="logo-icon">D</div>
                <div class="logo-text">
                    <h1>A股复盘导航面板</h1>
                    <div class="tagline">Dashboard · 动态聚合 · 一键直达</div>
                </div>
            </div>
            <div class="header-stats">
                <div>
                    <div class="date-display">最新评分 <span id="latestScore" style="font-weight:800;">--</span> / 100</div>
                    <div class="meta-info" id="latestDate">加载中...</div>
                </div>
            </div>
        </div>
    </header>

    <!-- 二级导航 -->
    <nav class="dashboard-sticky-nav" id="topNav" style="max-width: 1200px; margin-left: auto; margin-right: auto; width: calc(100% - 3rem);">
        <a href="#daily-reports" class="active">日复盘</a>
        <a href="#weekly-reports">周复盘</a>
        <a href="#quick-stats">快速统计</a>
        <a href="#system-status">系统状态</a>
    </nav>

    <div class="modern-container">
        
        <!-- 日复盘报告 -->
        <section id="daily-reports" class="section-anchor" style="margin-bottom: 2.5rem;">
            <div class="section-header">
                <h2>日复盘报告</h2>
                <span class="report-badge daily">Daily Review</span>
            </div>
            <div id="dailyList"></div>
        </section>

        <!-- 周复盘报告 -->
        <section id="weekly-reports" class="section-anchor" style="margin-bottom: 2.5rem;">
            <div class="section-header">
                <h2>周复盘报告</h2>
                <span class="report-badge weekly">Weekly Review</span>
            </div>
            <div id="weeklyList"></div>
        </section>

        <!-- 快速统计 -->
        <section id="quick-stats" class="section-anchor" style="margin-bottom: 2.5rem;">
            <div class="section-header">
                <h2>快速统计</h2>
            </div>
            <div id="weeklyStats" class="stats-mini-grid"></div>
        </section>

        <!-- 系统状态 -->
        <section id="system-status" class="section-anchor" style="margin-bottom: 2.5rem;">
            <div class="section-header">
                <h2>系统状态</h2>
            </div>
            <div id="taskStatus"></div>
        </section>

    </div>

    <footer class="modern-footer">
        <div class="footer-content">
            <div class="footer-section">
                <h4>A股职业交易复盘系统</h4>
                <p>Dashboard 汇总面板</p>
                <p style="margin-top: 0.5rem;">更新时间：<span id="updateTime">--</span></p>
            </div>
            <div class="footer-section">
                <h4>数据源</h4>
                <p>东方财富、同花顺、证券时报、财联社</p>
            </div>
            <div class="footer-section">
                <h4>风险提示</h4>
                <p>本系统仅作分析参考，不构成投资建议。市场有风险，投资需谨慎。</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 A股职业交易复盘系统 · All Rights Reserved</p>
        </div>
    </footer>

    <script>
        const mockDailyReports = [
            {
                date: "2026-05-22",
                title: "周五复盘",
                path: "daily/2026-05-22.html",
                score: 75,
                metrics: [
                    { label: "上证", value: "+0.87%", type: "up" },
                    { label: "涨停", value: "138", type: "up" },
                    { label: "跌停", value: "20", type: "neutral" },
                    { label: "成交额", value: "29033亿", type: "neutral" },
                    { label: "连板高度", value: "7→3板", type: "up" }
                ],
                summary: "缩量反弹，PCB/MLCC爆发，高标崩塌"
            }
        ];

        const mockWeeklyReports = [
            {
                date: "第21周",
                title: "5月19日-5月23日",
                path: "weekly/2026-week21.html",
                score: 67,
                metrics: [
                    { label: "周涨跌", value: "-0.54%", type: "down" },
                    { label: "涨停", value: "435", type: "up" },
                    { label: "跌停", value: "125", type: "neutral" },
                    { label: "日均成交", value: "30238亿", type: "primary" },
                    { label: "主线切换", value: "电力→PCB", type: "neutral" }
                ],
                summary: "震荡偏弱，电力退潮，PCB/MLCC崛起"
            }
        ];

        function getScoreClass(score) {
            if (score >= 90) return 'score-90-100';
            if (score >= 80) return 'score-80-90';
            if (score >= 70) return 'score-70-80';
            if (score >= 60) return 'score-60-70';
            return 'score-0-60';
        }

        function renderReportList(containerId, reports, type) {
            const container = document.getElementById(containerId);
            if (!container) return;

            if (reports.length === 0) {
                container.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><p>暂无报告</p></div>`;
                return;
            }

            container.innerHTML = reports.map(report => {
                const scoreClass = getScoreClass(report.score);
                const metricsHtml = report.metrics.map(m => 
                    `<span class="metric-chip ${m.type}">${m.label}: ${m.value}</span>`
                ).join('');

                return `
                    <div style="margin-bottom: 1rem;">
                        <a href="${report.path}" class="report-item-dashboard ${type}">
                            <div class="score-circle-md ${scoreClass}">${report.score}</div>
                            <div class="report-body">
                                <div class="report-title">${report.date} · ${report.title}</div>
                                <div class="report-summary">${report.summary}</div>
                                <div class="metrics-row">${metricsHtml}</div>
                            </div>
                            <span class="view-btn">查看详情</span>
                        </a>
                    </div>
                `;
            }).join('');
        }

        function updateSystemStatus() {
            const now = new Date();
            document.getElementById('updateTime').textContent = now.toLocaleString('zh-CN');

            if (mockDailyReports.length > 0) {
                const latest = mockDailyReports[0];
                document.getElementById('latestScore').textContent = latest.score;
                document.getElementById('latestDate').textContent = latest.date;
            }

            const tasks = [
                { name: "周一复盘", time: "16:00" },
                { name: "周二复盘", time: "16:00" },
                { name: "周三复盘", time: "16:00" },
                { name: "周四复盘", time: "16:00" },
                { name: "周五复盘", time: "16:00" },
                { name: "周复盘", time: "周日 16:00" }
            ];

            document.getElementById('taskStatus').innerHTML = `
                <div style="background: white; border-radius: var(--radius-xl); padding: 1.5rem; box-shadow: var(--shadow-md);">
                    <h3 style="margin-bottom: 1rem; font-size: 1.1rem; font-weight: 600;">定时任务状态</h3>
                    <div class="task-grid">
                        ${tasks.map(t => `
                            <div class="task-item">
                                <div class="task-name">${t.name}</div>
                                <div class="task-time">${t.time}</div>
                                <span class="task-status">等待执行</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            document.getElementById('weeklyStats').innerHTML = [
                { label: "本周涨停数", value: "435" },
                { label: "本周跌停数", value: "125" },
                { label: "日均成交额", value: "30238亿" },
                { label: "综合评分", value: "67" },
                { label: "主线板块", value: "PCB/MLCC" }
            ].map(s => `
                <div class="stat-mini">
                    <div class="label">${s.label}</div>
                    <div class="value">${s.value}</div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderReportList('dailyList', mockDailyReports, 'daily');
            renderReportList('weeklyList', mockWeeklyReports, 'weekly');
            updateSystemStatus();

            document.querySelectorAll('#topNav a').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.querySelectorAll('#topNav a').forEach(a => a.classList.remove('active'));
                    this.classList.add('active');
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        window.scrollTo({ top: target.offsetTop - 140, behavior: 'smooth' });
                    }
                });
            });
        });
    </script>
</body>
</html>
