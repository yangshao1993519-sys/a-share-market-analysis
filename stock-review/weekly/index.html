<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周复盘 - A股复盘</title>
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="nav-logo"><span class="logo-icon">&#9650;</span>A股复盘</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/">首页</a></li>
      <li><a href="/daily/">日复盘</a></li>
      <li><a href="/weekly/" class="active">周复盘</a></li>
      <li><a href="/thoughts/">交易心得</a></li>
      <li><a href="/chat/">交流区</a></li>
    </ul>
    <div class="nav-user" id="navUser"></div>
  </div>
</nav>

<div class="main-container">
  <div class="guest-banner hidden" id="guestBanner">
    <span>游客模式下仅显示最近7天的复盘内容</span>
    <a href="/login.html" class="btn btn-primary btn-sm">立即登录</a>
  </div>

  <h2 style="margin-bottom:16px;">周复盘</h2>
  <div class="post-list" id="postList">
    <div class="empty-state"><div class="empty-text">加载中...</div></div>
  </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  updateNav();
  loadList();
});

function updateNav() {
  const navUser = document.getElementById('navUser');
  if (Auth.isLoggedIn()) {
    const user = Auth.getUser();
    let html = '<span class="username">' + escapeHtml(user.username) + '</span>';
    if (user.role === 'admin') html += '<span class="badge-admin">管理员</span>';
    html += '<a href="javascript:Auth.logout()" class="btn btn-sm">退出</a>';
    navUser.innerHTML = html;
  } else {
    navUser.innerHTML = '<a href="/login.html" class="btn btn-primary btn-sm">登录</a>';
    document.getElementById('guestBanner').classList.remove('hidden');
  }
}

async function loadList() {
  try {
    const resp = await api.get('/api/weekly/list');
    const container = document.getElementById('postList');

    if (resp.code !== 0 || !resp.data || !resp.data.list || resp.data.list.length === 0) {
      container.innerHTML = '<div class="empty-state"><div class="empty-text">暂无周复盘内容</div></div>';
      return;
    }

    container.innerHTML = resp.data.list.map(item =>
      '<a class="post-card" href="/weekly/detail.html?date=' + encodeURIComponent(item.date) + '">' +
        '<div class="post-date">' + escapeHtml(item.date) + '</div>' +
        '<div class="post-title">' + escapeHtml(item.title || item.date + ' 周复盘') + '</div>' +
        '<div class="post-preview">' + escapeHtml((item.preview || item.content || '').substring(0, 120)) + '</div>' +
      '</a>'
    ).join('');
  } catch (e) {
    document.getElementById('postList').innerHTML = '<div class="empty-state"><div class="empty-text">加载失败，请稍后重试</div></div>';
  }
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
