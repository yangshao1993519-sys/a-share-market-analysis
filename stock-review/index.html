<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股复盘 - 首页</title>
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="nav-logo">
      <span class="logo-icon">&#9650;</span>A股复盘
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/" class="active">首页</a></li>
      <li><a href="/daily/">日复盘</a></li>
      <li><a href="/weekly/">周复盘</a></li>
      <li><a href="/thoughts/">交易心得</a></li>
      <li><a href="/chat/">交流区</a></li>
    </ul>
    <div class="nav-user" id="navUser">
      <a href="/login.html" class="btn btn-primary btn-sm" id="btnLogin">登录</a>
    </div>
  </div>
</nav>

<div class="main-container">
  <!-- 指数数据 行1 -->
  <div class="data-grid" id="indexCards">
    <div class="index-card"><div class="index-name">上证指数</div><div class="index-value text-muted">--</div><div class="index-change">加载中...</div></div>
    <div class="index-card"><div class="index-name">深证成指</div><div class="index-value text-muted">--</div><div class="index-change">加载中...</div></div>
    <div class="index-card"><div class="index-name">创业板指</div><div class="index-value text-muted">--</div><div class="index-change">加载中...</div></div>
    <div class="index-card"><div class="index-name">科创50</div><div class="index-value text-muted">--</div><div class="index-change">加载中...</div></div>
  </div>

  <!-- 市场概况 行2 -->
  <div class="data-grid data-grid-5" id="marketStats">
    <div class="index-card"><div class="index-name">成交额</div><div class="index-value text-muted" style="font-size:1.2rem">--</div></div>
    <div class="index-card"><div class="index-name">涨跌比</div><div class="index-value text-muted" style="font-size:1.2rem">--</div></div>
    <div class="index-card"><div class="index-name">涨停数</div><div class="index-value text-up" style="font-size:1.2rem">--</div></div>
    <div class="index-card"><div class="index-name">跌停数</div><div class="index-value text-down" style="font-size:1.2rem">--</div></div>
    <div class="index-card"><div class="index-name">北向资金</div><div class="index-value text-muted" style="font-size:1.2rem">--</div></div>
  </div>

  <!-- 领涨/领跌行业 -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
    <div class="card">
      <div class="card-header"><span class="text-up">领涨行业 TOP5</span></div>
      <div class="card-body" style="padding:0;">
        <table class="data-table" id="topGainers"><thead><tr><th>行业</th><th>涨跌幅</th></tr></thead><tbody><tr><td colspan="2" class="text-muted">加载中...</td></tr></tbody></table>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><span class="text-down">领跌行业 TOP5</span></div>
      <div class="card-body" style="padding:0;">
        <table class="data-table" id="topLosers"><thead><tr><th>行业</th><th>涨跌幅</th></tr></thead><tbody><tr><td colspan="2" class="text-muted">加载中...</td></tr></tbody></table>
      </div>
    </div>
  </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  updateNavUser();
  loadMarketData();
});

function updateNavUser() {
  const navUser = document.getElementById('navUser');
  if (Auth.isLoggedIn()) {
    const user = Auth.getUser();
    let html = '<span class="username">' + escapeHtml(user.username) + '</span>';
    if (user.role === 'admin') html += '<span class="badge-admin">管理员</span>';
    html += '<a href="javascript:Auth.logout()" class="btn btn-sm">退出</a>';
    navUser.innerHTML = html;
  }
}

async function loadMarketData() {
  try {
    const resp = await api.get('/api/market/today');
    if (resp.code !== 0 || !resp.data) return;

    const d = resp.data;
    renderIndexCards(d.indices);
    renderStats(d.stats);
    renderSectors('topGainers', d.top_gainers || [], 'up');
    renderSectors('topLosers', d.top_losers || [], 'down');
  } catch (e) {
    console.error('Market data load failed:', e);
  }
}

function renderIndexCards(indices) {
  if (!indices) return;
  const container = document.getElementById('indexCards');
  const html = (indices || []).map(i => {
    const cls = (i.change_pct || 0) >= 0 ? 'up' : 'down';
    const sign = (i.change_pct || 0) >= 0 ? '+' : '';
    return '<div class="index-card">' +
      '<div class="index-name">' + escapeHtml(i.name) + '</div>' +
      '<div class="index-value">' + (i.value != null ? i.value.toFixed(2) : '--') + '</div>' +
      '<div class="index-change ' + cls + '">' + sign + (i.change_pct != null ? i.change_pct.toFixed(2) : '--') + '%</div>' +
      '<div class="index-label">' + escapeHtml(i.code || '') + '</div>' +
      '</div>';
  }).join('');
  container.innerHTML = html;
}

function renderStats(stats) {
  if (!stats) return;
  const container = document.getElementById('marketStats');
  const turnover = stats.turnover ? (stats.turnover / 1e8).toFixed(0) + '亿' : '--';
  const ratio = stats.up_count && stats.down_count ? stats.up_count + ':' + stats.down_count : '--';
  container.innerHTML =
    '<div class="index-card"><div class="index-name">成交额</div><div class="index-value text-muted" style="font-size:1.2rem">' + turnover + '</div></div>' +
    '<div class="index-card"><div class="index-name">涨跌比</div><div class="index-value text-muted" style="font-size:1.2rem">' + ratio + '</div></div>' +
    '<div class="index-card"><div class="index-name">涨停数</div><div class="index-value text-up" style="font-size:1.2rem">' + (stats.limit_up != null ? stats.limit_up : '--') + '</div></div>' +
    '<div class="index-card"><div class="index-name">跌停数</div><div class="index-value text-down" style="font-size:1.2rem">' + (stats.limit_down != null ? stats.limit_down : '--') + '</div></div>' +
    '<div class="index-card"><div class="index-name">北向资金</div><div class="index-value text-muted" style="font-size:1.2rem">' + (stats.north_bound != null ? (stats.north_bound / 1e8).toFixed(1) + '亿' : '--') + '</div></div>';
}

function renderSectors(tableId, sectors, cls) {
  const tbody = document.querySelector('#' + tableId + ' tbody');
  if (!sectors || sectors.length === 0) {
    tbody.innerHTML = '<tr><td colspan="2" class="text-muted">暂无数据</td></tr>';
    return;
  }
  tbody.innerHTML = sectors.map(s =>
    '<tr><td>' + escapeHtml(s.name) + '</td><td class="' + cls + '">' +
    (s.change_pct >= 0 ? '+' : '') + (s.change_pct != null ? s.change_pct.toFixed(2) : '--') + '%</td></tr>'
  ).join('');
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
