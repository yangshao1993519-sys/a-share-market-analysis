<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>交流区 - A股复盘</title>
<link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="nav-logo"><span class="logo-icon">&#9650;</span>A股复盘</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="/">首页</a></li>
      <li><a href="/daily/">日复盘</a></li>
      <li><a href="/weekly/">周复盘</a></li>
      <li><a href="/thoughts/">交易心得</a></li>
      <li><a href="/chat/" class="active">交流区</a></li>
    </ul>
    <div class="nav-user" id="navUser"></div>
  </div>
</nav>

<div class="main-container">
  <!-- 发言框（仅登录可见） -->
  <div class="compose-box hidden" id="composeBox">
    <textarea id="chatInput" placeholder="分享你的交易感悟..." maxlength="2000"></textarea>
    <div class="compose-footer">
      <span class="compose-hint">Ctrl+Enter 快捷发送 | 最多2000字</span>
      <button class="btn btn-primary" id="btnSend">发表</button>
    </div>
    <div class="sensitive-warning" id="sensitiveWarn">内容包含不当词汇，请修改后重试</div>
  </div>

  <!-- 未登录提示 -->
  <div class="guest-banner hidden" id="guestComposeBanner">
    <span>登录后参与讨论</span>
    <a href="/login.html?redirect=%2Fchat%2F" class="btn btn-primary btn-sm">立即登录</a>
  </div>

  <h2 style="margin-bottom:16px;">交流区</h2>
  <div class="chat-list" id="chatList">
    <div class="empty-state"><div class="empty-text">加载中...</div></div>
  </div>

  <div class="pagination hidden" id="pagination">
    <button class="btn btn-sm" id="btnLoadMore">加载更多</button>
  </div>
</div>

<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ui.js"></script>
<script>
let currentPage = 1;
const PAGE_SIZE = 20;

document.addEventListener('DOMContentLoaded', () => {
  updateNav();
  updateComposeBox();
  loadChatList();

  document.getElementById('btnSend').addEventListener('click', sendMessage);
  document.getElementById('chatInput').addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'Enter') sendMessage();
  });
  document.getElementById('btnLoadMore').addEventListener('click', () => {
    currentPage++;
    loadChatList(true);
  });
});

function updateNav() {
  const navUser = document.getElementById('navUser');
  if (Auth.isLoggedIn()) {
    const user = Auth.getUser();
    let html = '<span class="username">' + escapeHtml(user.username) + '</span>';
    if (user.role === 'admin') html += '<span class="badge-admin">管理员</span>';
    html += '<a href="javascript:Auth.logout()" class="btn btn-sm">退出</a>';
    navUser.innerHTML = html;
  } else {
    navUser.innerHTML = '<a href="/login.html" class="btn btn-primary btn-sm">登录</a>';
  }
}

function updateComposeBox() {
  if (Auth.isLoggedIn()) {
    document.getElementById('composeBox').classList.remove('hidden');
    document.getElementById('guestComposeBanner').classList.add('hidden');
  } else {
    document.getElementById('composeBox').classList.add('hidden');
    document.getElementById('guestComposeBanner').classList.remove('hidden');
  }
}

async function loadChatList(append) {
  try {
    const resp = await api.get('/api/chat/list?page=' + currentPage + '&page_size=' + PAGE_SIZE);
    const container = document.getElementById('chatList');

    if (!append) container.innerHTML = '';

    if (resp.code !== 0 || !resp.data || !resp.data.list || resp.data.list.length === 0) {
      if (!append) container.innerHTML = '<div class="empty-state"><div class="empty-text">暂无留言，快来抢沙发</div></div>';
      document.getElementById('pagination').classList.add('hidden');
      return;
    }

    const isAdmin = Auth.isLoggedIn() && Auth.getUser() && Auth.getUser().role === 'admin';
    const html = resp.data.list.map(item =>
      '<div class="chat-item" data-id="' + item.id + '">' +
        '<div class="chat-header">' +
          '<span class="chat-user">' + escapeHtml(item.username || '匿名') + '</span>' +
          '<span class="chat-time">' + escapeHtml(item.time || '') + '</span>' +
        '</div>' +
        '<div class="chat-body">' + escapeHtml(item.content || '') + '</div>' +
        (isAdmin ? '<div class="chat-actions"><button class="btn btn-danger btn-sm btn-del" data-id="' + item.id + '">删除</button></div>' : '') +
      '</div>'
    ).join('');

    if (append) {
      container.insertAdjacentHTML('beforeend', html);
    } else {
      container.innerHTML = html;
    }

    // 绑定删除按钮
    if (isAdmin) {
      document.querySelectorAll('.btn-del').forEach(btn => {
        btn.addEventListener('click', function() {
          deleteComment(this.dataset.id);
        });
      });
    }

    // 分页
    const hasMore = resp.data.total > currentPage * PAGE_SIZE;
    if (hasMore) {
      document.getElementById('pagination').classList.remove('hidden');
    } else {
      document.getElementById('pagination').classList.add('hidden');
    }
  } catch (e) {
    if (!append) document.getElementById('chatList').innerHTML = '<div class="empty-state"><div class="empty-text">加载失败</div></div>';
  }
}

async function sendMessage() {
  if (!Auth.requireLogin()) return;

  const input = document.getElementById('chatInput');
  const content = input.value.trim();
  const warnEl = document.getElementById('sensitiveWarn');
  warnEl.classList.remove('show');

  if (!content) {
    showToast('请输入内容', 'warning');
    return;
  }

  try {
    const resp = await api.post('/api/chat/write', { content });
    if (resp.code === 0) {
      input.value = '';
      currentPage = 1;
      loadChatList();
      showToast('发表成功', 'success');
    } else if (resp.code === 400 && resp.msg && resp.msg.includes('敏感')) {
      warnEl.classList.add('show');
    } else {
      showToast(resp.msg || '发表失败', 'error');
    }
  } catch (e) {
    // error handled by api.js
  }
}

async function deleteComment(id) {
  if (!confirm('确定删除这条留言吗？此操作不可撤销。')) return;

  try {
    const resp = await api.delete('/api/chat/delete', { id });
    if (resp.code === 0) {
      const el = document.querySelector('.chat-item[data-id="' + id + '"]');
      if (el) el.remove();
      showToast('已删除', 'success');
    } else {
      showToast(resp.msg || '删除失败', 'error');
    }
  } catch (e) {
    // handled by api.js
  }
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
